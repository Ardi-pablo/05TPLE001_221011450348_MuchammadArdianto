<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator Sederhana</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .calculator {
            background-color: #22252d;
            padding: 20px;
            border-radius: 30px;
            box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.3);
            width: 300px;
        }
        #display {
            width: 100%;
            height: 80px;
            background-color: transparent;
            border: none;
            color: #ffffff;
            font-size: 2.5rem;
            text-align: right;
            padding: 10px;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            padding: 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            background-color: #292d36;
            color: #ffffff;
            transition: background-color 0.2s;
        }
        button:active {
            transform: scale(0.95);
        }
        button.operator {
            color: #eb6666;
        }
        button.clear {
            color: #26ffd8;
        }
        button.equal {
            background-color: #eb6666;
            color: white;
            grid-column: span 2;
        }
        button.equal:hover {
            background-color: #fa7373;
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" readonly value="0">
    
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendOperator('/')">/</button>
        <button class="operator" onclick="appendOperator('*')">x</button>
        <button class="operator" onclick="deleteLast()">⌫</button>
        
        <button onclick="appendNumber('7')">7</button>
        <button onclick="appendNumber('8')">8</button>
        <button onclick="appendNumber('9')">9</button>
        <button class="operator" onclick="appendOperator('-')">-</button>
        
        <button onclick="appendNumber('4')">4</button>
        <button onclick="appendNumber('5')">5</button>
        <button onclick="appendNumber('6')">6</button>
        <button class="operator" onclick="appendOperator('+')">+</button>
        
        <button onclick="appendNumber('1')">1</button>
        <button onclick="appendNumber('2')">2</button>
        <button onclick="appendNumber('3')">3</button>
        <button onclick="appendNumber('.')">.</button>
        
        <button onclick="appendNumber('0')">0</button>
        <button class="equal" onclick="calculateResult()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');
    let inputBaru = true;

    // Menambah Angka ke Layar
    function appendNumber(number) {
        if (display.value === '0' || inputBaru) {
            display.value = number;
            inputBaru = false;
        } else {
            // Mencegah titik desimal ganda dalam satu bilangan
            if (number === '.' && display.value.includes('.')) return;
            display.value += number;
        }
    }

    // Menambah Operator
    function appendOperator(operator) {
        const charTerakhir = display.value.slice(-1);
        // Mencegah operator ganda berurutan (misal: ++ atau +*)
        if (['+', '-', '*', '/'].includes(charTerakhir)) {
            display.value = display.value.slice(0, -1) + operator;
        } else {
            display.value += operator;
        }
        inputBaru = false;
    }

    // Menghapus Semua (Reset)
    function clearDisplay() {
        display.value = '0';
        inputBaru = true;
    }

    // Menghapus Karakter Terakhir (Backspace)
    function deleteLast() {
        if (display.value.length > 1) {
            display.value = display.value.slice(0, -1);
        } else {
            display.value = '0';
            inputBaru = true;
        }
    }

    // Melakukan Perhitungan matematika
    function calculateResult() {
        try {
            // Menggunakan fungsi eval() untuk mengevaluasi string matematika aman dari kalkulator
            let hasil = eval(display.value);
            
            // Mengatasi error pembagian dengan nol (Infinity)
            if (hasil === Infinity || isNaN(hasil)) {
                display.value = "Error";
            } else {
                // Membatasi angka di belakang koma jika desimalnya terlalu panjang
                display.value = Number(hasil.toFixed(4));
            }
            inputBaru = true;
        } catch (error) {
            display.value = "Error";
            inputBaru = true;
        }
    }
</script>

</body>
</html>
